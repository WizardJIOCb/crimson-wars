<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crimson Wars - Skills Admin</title>
  <style>
    body{font-family:Segoe UI,Tahoma,sans-serif;background:#0b0f14;color:#e5e7eb;margin:0;padding:16px}
    .row{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
    input,button,select{background:#111827;color:#e5e7eb;border:1px solid #334155;border-radius:8px;padding:8px}
    table{width:100%;border-collapse:collapse;background:#0f172a}
    th,td{border:1px solid #1f2937;padding:6px;font-size:13px}
    th{background:#111827;position:sticky;top:0}
    .ok{color:#34d399}.err{color:#f87171}
  </style>
</head>
<body>
  <h1>Skills Admin</h1>
  <div class="row">
    <label>Token <input id="token" placeholder="SKILLS_ADMIN_TOKEN" /></label>
    <button id="load">Load</button>
    <button id="save">Save selected row</button>
    <span id="msg"></span>
  </div>
  <div class="row">
    <label>Skill <select id="skill"></select></label>
    <label>Name <input id="name" /></label>
    <label>Kind <select id="kind"><option>passive</option><option>active</option></select></label>
    <label>Rarity <select id="rarity"><option>common</option><option>rare</option><option>epic</option></select></label>
    <label>Max lvl <input id="maxLevel" type="number" min="1" max="12" /></label>
    <label>Weight <input id="weight" type="number" step="0.01" /></label>
    <label>Desc <input id="desc" /></label>
  </div>
  <script>
    const $ = (id) => document.getElementById(id);
    let skills = [];
    function msg(t, ok=true){ const el=$('msg'); el.textContent=t; el.className=ok?'ok':'err'; }
    function fillSelect(){
      const s=$('skill'); s.innerHTML='';
      skills.forEach(x=>{ const o=document.createElement('option'); o.value=x.id; o.textContent=x.id; s.appendChild(o); });
      if (skills.length) { s.value=skills[0].id; fillForm(skills[0]); }
    }
    function fillForm(sk){
      $('name').value = sk.name || '';
      $('kind').value = sk.kind || 'passive';
      $('rarity').value = sk.rarity || 'common';
      $('maxLevel').value = sk.maxLevel || 1;
      $('weight').value = sk.weight || 1;
      $('desc').value = sk.desc || '';
    }
    function current(){ return skills.find(x=>x.id === $('skill').value); }
    $('skill').addEventListener('change',()=>{ const sk=current(); if(sk) fillForm(sk); });
    $('load').addEventListener('click', async()=>{
      try{
        const token=encodeURIComponent($('token').value.trim());
        const res=await fetch('/api/admin/skills?token='+token,{cache:'no-store'});
        const data=await res.json();
        if(!res.ok) throw new Error(data.message || ('HTTP '+res.status));
        skills=Array.isArray(data.skills)?data.skills:[];
        fillSelect();
        msg('Loaded '+skills.length+' skills');
      }catch(e){ msg(e.message,false); }
    });
    $('save').addEventListener('click', async()=>{
      const sk=current(); if(!sk){ msg('No skill selected',false); return; }
      const patch={
        name:$('name').value,
        kind:$('kind').value,
        rarity:$('rarity').value,
        maxLevel:Number($('maxLevel').value||1),
        weight:Number($('weight').value||1),
        desc:$('desc').value,
      };
      try{
        const token=encodeURIComponent($('token').value.trim());
        const res=await fetch('/api/admin/skills/'+encodeURIComponent(sk.id)+'?token='+token,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(patch)});
        const data=await res.json();
        if(!res.ok) throw new Error(data.message || ('HTTP '+res.status));
        const i=skills.findIndex(x=>x.id===sk.id); if(i>=0) skills[i]=data.skill;
        fillForm(data.skill);
        msg('Saved '+sk.id);
      }catch(e){ msg(e.message,false); }
    });
  </script>
</body>
</html>
