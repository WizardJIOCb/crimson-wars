<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crimson Wars</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="hud">
    <div class="panel" id="info-panel">
      <h1>Crimson Wars</h1>
      <p>WASD move, mouse aim, LMB fire</p>
      <p>Press `1` for pistol, `H` hide menu</p>
      <p id="status">Connecting...</p>
      <p id="room-meta"></p>
      <p id="weapon-meta"></p>
      <p id="fps-meta">FPS: --</p>
      <p id="net-meta">NET: --</p>
      <p>
        Quality:
        <select id="quality-select">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </p>
      <p class="shadow-option">
        <label>
          <input id="shadow-toggle" type="checkbox" checked />
          Shadows
        </label>
      </p>
      <p class="shadow-option">
        <label>
          <input id="enemy-hp-toggle" type="checkbox" checked />
          Enemy HP Bars
        </label>
      </p>
      <p class="shadow-option">
        <label>
          <input id="extra-blood-toggle" type="checkbox" checked />
          Extra blood
        </label>
      </p>
      <p class="shadow-option">
        <label>
          <input id="hit-effects-toggle" type="checkbox" checked />
          Hit effects
        </label>
      </p>
      <p class="shadow-option">
        <label>
          <input id="conn-indicator-toggle" type="checkbox" checked />
          Connection indicator
        </label>
      </p>
    </div>
    <button id="toggle-info" class="hud-toggle" type="button">Hide menu</button>
    <div class="panel" id="scoreboard"></div>
  </div>

  <canvas id="game" width="1280" height="720"></canvas>

  <div id="join-overlay">
    <div id="death-cinematic" class="death-cinematic" aria-hidden="true">
      <div id="death-text" class="death-text">YOU DIE!!!</div>
      <div class="death-impact"></div>
      <div class="death-drips"></div>
      <button id="death-continue" type="button" class="death-continue">Show menu</button>
    </div>
    <form id="join-form" autocomplete="off">
      <label for="name">Nickname</label>
      <input id="name" maxlength="18" value="Fighter" />

      <label>Character</label>
      <div id="character-select" class="character-select"></div>

      <label for="room-code">Room code (optional)</label>
      <input id="room-code" maxlength="10" placeholder="AUTO or e.g. ABC123" />

      <details id="sync-settings" class="sync-settings">
        <summary>Sync settings (Create room)</summary>
        <label for="sync-preset">Preset</label>
        <select id="sync-preset">
          <option value="normal" selected>Normal (default)</option>
          <option value="better">Better</option>
          <option value="best">Best</option>
          <option value="custom">Custom</option>
        </select>
        <div class="sync-grid">
          <label for="sync-tickrate">Tickrate</label>
          <input id="sync-tickrate" type="number" min="20" max="120" step="1" />

          <label for="sync-state-rate">State send rate (Hz)</label>
          <input id="sync-state-rate" type="number" min="10" max="120" step="1" />

          <label for="sync-render-delay">Interp delay (ms)</label>
          <input id="sync-render-delay" type="number" min="20" max="250" step="1" />

          <label for="sync-max-extrapolation">Max extrapolation (ms)</label>
          <input id="sync-max-extrapolation" type="number" min="20" max="250" step="1" />

          <label for="sync-entity-interp">Entity interp rate</label>
          <input id="sync-entity-interp" type="number" min="4" max="50" step="1" />

          <label for="sync-bullet-correction">Bullet correction rate</label>
          <input id="sync-bullet-correction" type="number" min="4" max="60" step="1" />

          <label for="sync-input-rate">Input send rate (Hz)</label>
          <input id="sync-input-rate" type="number" min="10" max="120" step="1" />
        </div>
      </details>

      <div class="actions">
        <button type="submit" data-mode="create">Create room</button>
        <button type="submit" data-mode="join" class="secondary">Join code</button>
      </div>
      <div id="death-result" class="death-result">Last result: --</div>
      <div id="rooms-browser" class="rooms-browser">
        <div class="rooms-head">
          <span>Active rooms</span>
          <button type="button" id="refresh-rooms" class="mini">Refresh</button>
        </div>
        <div id="presence-meta" class="presence-meta">Online: -- | In game: -- | In menu: --</div>
        <div id="rooms-list" class="rooms-list">Loading...</div>
      </div>
      <div id="records-browser" class="rooms-browser records-browser">
        <div class="rooms-head">
          <span>Top records <span id="records-total">(Total: 0)</span></span>
          <button type="button" id="refresh-records" class="mini">Refresh</button>
        </div>
        <div id="records-list" class="rooms-list">Loading...</div>
        <div class="records-pager">
          <button type="button" id="records-prev" class="mini">Prev</button>
          <span id="records-page">Page 1/1</span>
          <button type="button" id="records-next" class="mini">Next</button>
        </div>
      </div>
    </form>
  </div>

  <div id="mobile-controls" aria-hidden="true">
    <div class="stick" id="move-stick">
      <div class="stick-knob" id="move-knob"></div>
      <span class="stick-label">MOVE</span>
    </div>
    <div class="stick" id="aim-stick">
      <div class="stick-knob" id="aim-knob"></div>
      <span class="stick-label">AIM</span>
    </div>
  </div>
  <script src="/client.js"></script>
</body>
</html>
